<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="40%" style="stop-color:#1a2744"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="0%" r="60%">
      <stop offset="0%" style="stop-color:#243b6e;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:0"/>
    </radialGradient>

    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E8C97A;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#E8C97A;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#E8C97A;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#E8C97A;stop-opacity:0"/>
    </linearGradient>

    <!-- Glow effect -->
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="220" fill="url(#bg)" rx="12"/>
  <rect width="900" height="220" fill="url(#glow)" rx="12"/>

  <!-- Grid -->
  <g opacity="0.06" stroke="#8BAFD4" stroke-width="0.5">
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="0" y1="200" x2="900" y2="200"/>

    <line x1="150" y1="0" x2="150" y2="220"/>
    <line x1="300" y1="0" x2="300" y2="220"/>
    <line x1="450" y1="0" x2="450" y2="220"/>
    <line x1="600" y1="0" x2="600" y2="220"/>
    <line x1="750" y1="0" x2="750" y2="220"/>
  </g>

  <!-- Accent dots -->
  <circle cx="80" cy="40" r="2" fill="#E8C97A" opacity="0.5"/>
  <circle cx="820" cy="180" r="2" fill="#8BAFD4" opacity="0.5"/>
  <circle cx="100" cy="180" r="1.5" fill="#8BAFD4" opacity="0.4"/>
  <circle cx="800" cy="40" r="1.5" fill="#E8C97A" opacity="0.4"/>
  <circle cx="450" cy="20" r="1" fill="#E8C97A" opacity="0.6"/>

  <!-- Decorative line -->
  <rect x="170" y="132" width="560" height="1.5" fill="url(#line)" opacity="0.8"/>

  <!-- Main Name -->
  <text x="450" y="90"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="44"
    font-weight="800"
    fill="#E8C97A"
    text-anchor="middle"
    letter-spacing="3"
    filter="url(#softGlow)">
    Ghiles AHRES
  </text>

  <!-- Subtitle -->
  <text x="450" y="120"
    font-family="'Segoe UI', sans-serif"
    font-size="16"
    font-weight="700"
    fill="#B7CAE6"
    text-anchor="middle"
    letter-spacing="4">
    ACTUAIRE  ·  DATA ANALYST
  </text>

  <!-- Tags Row 1 -->
  <text x="120" y="168"
    font-family="'Segoe UI', sans-serif"
    font-size="12"
    font-weight="700"
    fill="#C9D1D9"
    text-anchor="middle">
    Python
  </text>

  <text x="190" y="168"
    font-family="'Segoe UI', sans-serif"
    font-size="12"
    font-weight="700"
    fill="#C9D1D9"
    text-anchor="middle">
    R
  </text>

  <text x="255" y="168"
    font-family="'Segoe UI', sans-serif"
    font-size="12"
    font-weight="700"
    fill="#C9D1D9"
    text-anchor="middle">
    SQL
  </text>

  <text x="390" y="168"
    font-family="'Segoe UI', sans-serif"
    font-size="12"
    font-weight="700"
    fill="#E8C97A"
    text-anchor="middle">
    Modélisation actuarielle
  </text>

  <text x="535" y="168"
    font-family="'Segoe UI', sans-serif"
    font-size="12"
    font-weight="700"
    fill="#C9D1D9"
    text-anchor="middle">
    SAS
  </text>

  <text x="685" y="168"
    font-family="'Segoe UI', sans-serif"
    font-size="12"
    font-weight="700"
    fill="#C9D1D9"
    text-anchor="middle">
    Machine Learning
  </text>

  <!-- Tags Row 2 -->
  <text x="220" y="192"
    font-family="'Segoe UI', sans-serif"
    font-size="12"
    font-weight="700"
    fill="#F2C811"
    text-anchor="middle">
    Power BI
  </text>

  <text x="350" y="192"
    font-family="'Segoe UI', sans-serif"
    font-size="12"
    font-weight="700"
    fill="#52D726"
    text-anchor="middle">
    Qlik Sense
  </text>

  <text x="620" y="192"
    font-family="'Segoe UI', sans-serif"
    font-size="12"
    font-weight="700"
    fill="#E8C97A"
    text-anchor="middle">
    Tarification &amp; Paramétrage Produit Santé
  </text>

  <!-- Border -->
  <rect width="900" height="220" fill="none" stroke="#21262d" stroke-width="1" rx="12"/>

</svg>
