<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="40%" style="stop-color:#1a2744"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="0%" r="60%">
      <stop offset="0%" style="stop-color:#243b6e;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E8C97A;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#E8C97A;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#E8C97A;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#E8C97A;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bg)" rx="12"/>
  <rect width="900" height="200" fill="url(#glow)" rx="12"/>

  <!-- Grid pattern subtil -->
  <g opacity="0.06" stroke="#8BAFD4" stroke-width="0.5">
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="150" y1="0" x2="150" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="450" y1="0" x2="450" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="750" y1="0" x2="750" y2="200"/>
  </g>

  <!-- Accent dots -->
  <circle cx="80" cy="40" r="2" fill="#E8C97A" opacity="0.5"/>
  <circle cx="820" cy="160" r="2" fill="#8BAFD4" opacity="0.5"/>
  <circle cx="100" cy="160" r="1.5" fill="#8BAFD4" opacity="0.4"/>
  <circle cx="800" cy="40" r="1.5" fill="#E8C97A" opacity="0.4"/>
  <circle cx="450" cy="20" r="1" fill="#E8C97A" opacity="0.6"/>

  <!-- Ligne décorative dorée -->
  <rect x="200" y="128" width="500" height="1" fill="url(#line)" opacity="0.6"/>

  <!-- Nom principal -->
  <text x="450" y="88"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="42"
    font-weight="700"
    fill="#E8C97A"
    text-anchor="middle"
    letter-spacing="3">Ghiles AHRES</text>

  <!-- Sous-titre -->
  <text x="450" y="118"
    font-family="'Courier New', monospace"
    font-size="15"
    fill="#8BAFD4"
    text-anchor="middle"
    letter-spacing="4">ACTUAIRE  ·  DATA ANALYST</text>

  <!-- Tags -->
  <text x="214" y="158"
    font-family="'Courier New', monospace"
    font-size="11"
    fill="#484f58"
    text-anchor="middle">Python</text>
  <text x="290" y="158"
    font-family="'Courier New', monospace"
    font-size="11"
    fill="#484f58"
    text-anchor="middle">R</text>
  <text x="350" y="158"
    font-family="'Courier New', monospace"
    font-size="11"
    fill="#484f58"
    text-anchor="middle">SQL</text>
  <text x="450" y="158"
    font-family="'Courier New', monospace"
    font-size="11"
    fill="#484f58"
    text-anchor="middle">Modélisation actuarielle</text>
  <text x="570" y="158"
    font-family="'Courier New', monospace"
    font-size="11"
    fill="#484f58"
    text-anchor="middle">SAS</text>
  <text x="626" y="158"
    font-family="'Courier New', monospace"
    font-size="11"
    fill="#484f58"
    text-anchor="middle">Machine Learning</text>

  <!-- Bordure subtile -->
  <rect width="900" height="200" fill="none" stroke="#21262d" stroke-width="1" rx="12"/>
</svg>
